<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-dim": "#dcd9d9",
          "primary-container": "#0070eb",
          "primary": "#0058bc",
          "on-tertiary-fixed": "#07006c",
          "outline-variant": "#c1c6d7",
          "error": "#ba1a1a",
          "secondary": "#5e5e5e",
          "inverse-primary": "#adc6ff",
          "on-surface-variant": "#414755",
          "on-secondary-fixed-variant": "#474747",
          "on-primary": "#ffffff",
          "tertiary-container": "#6063ee",
          "tertiary": "#4648d4",
          "on-secondary-container": "#646464",
          "surface": "#fcf9f8",
          "secondary-fixed-dim": "#c6c6c6",
          "on-tertiary": "#ffffff",
          "on-secondary-fixed": "#1b1b1b",
          "on-error-container": "#93000a",
          "surface-container-lowest": "#ffffff",
          "tertiary-fixed-dim": "#c0c1ff",
          "on-tertiary-container": "#fffbff",
          "on-surface": "#1c1b1b",
          "surface-variant": "#e5e2e1",
          "secondary-fixed": "#e2e2e2",
          "on-primary-fixed": "#001a41",
          "surface-container-high": "#ebe7e7",
          "on-background": "#1c1b1b",
          "secondary-container": "#e2e2e2",
          "inverse-on-surface": "#f3f0ef",
          "on-primary-fixed-variant": "#004493",
          "on-primary-container": "#fefcff",
          "surface-container-low": "#f6f3f2",
          "surface-tint": "#005bc1",
          "inverse-surface": "#313030",
          "surface-container-highest": "#e5e2e1",
          "surface-bright": "#fcf9f8",
          "primary-fixed": "#d8e2ff",
          "on-secondary": "#ffffff",
          "outline": "#717786",
          "primary-fixed-dim": "#adc6ff",
          "on-error": "#ffffff",
          "error-container": "#ffdad6",
          "on-tertiary-fixed-variant": "#2f2ebe",
          "background": "#fcf9f8",
          "surface-container": "#f0edec",
          "tertiary-fixed": "#e1e0ff"
        },
        "borderRadius": {
          "DEFAULT": "0.125rem",
          "lg": "0.25rem",
          "xl": "0.5rem",
          "full": "0.75rem"
        },
        "spacing": {
          "base": "4px",
          "sm": "8px",
          "md": "16px",
          "container-max": "1280px",
          "lg": "24px",
          "xl": "48px",
          "xs": "4px",
          "gutter": "20px"
        },
        "fontFamily": {
          "code-md": ["JetBrains Mono"],
          "body-sm": ["Space Grotesk"],
          "body-md": ["Space Grotesk"],
          "h1": ["Space Grotesk"],
          "h2": ["Space Grotesk"],
          "display": ["Space Grotesk"],
          "body-lg": ["Space Grotesk"],
          "label-md": ["Space Grotesk"],
          "h3": ["Space Grotesk"]
        },
        "fontSize": {
          "code-md": ["14px", {"lineHeight": "1.7", "fontWeight": "400"}],
          "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
          "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
          "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
          "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
          "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
          "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
          "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
          "h3": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}]
        }
      },
    },
  }
</script>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen">

  <div id="navbar-container"></div>

  <main class="min-h-[calc(100vh-64px)] flex items-center justify-center px-5 py-10">

  <div class="w-full max-w-sm px-8 py-10 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm">

    <!-- 로고 -->
    <a class="block text-center font-display text-h2 font-bold text-primary tracking-tight mb-8" href="index.html">
      CodeBattles
    </a>

    <!-- 타이틀 -->
    <h1 class="font-h2 text-h2 text-on-surface mb-6">로그인</h1>

    <!-- 아이디 -->
    <div class="mb-4">
      <label class="block font-body-sm text-body-sm text-on-surface-variant mb-1" for="username">아이디</label>
      <input
        id="username"
        type="text"
        placeholder=""
        class="w-full px-md py-sm border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface placeholder:text-secondary focus:outline-none focus:border-primary transition-colors"
      />
    </div>

    <!-- 비밀번호 -->
    <div class="mb-6">
      <label class="block font-body-sm text-body-sm text-on-surface-variant mb-1" for="password">비밀번호</label>
      <input
        id="password"
        type="password"
        placeholder=""
        class="w-full px-md py-sm border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface placeholder:text-secondary focus:outline-none focus:border-primary transition-colors"
      />
    </div>

    <!-- 로그인 버튼 -->
    <button class="w-full py-sm bg-primary text-on-primary font-body-md text-body-md font-bold rounded-lg hover:bg-primary-container active:scale-95 transition-all mb-5">
      로그인
    </button>

    <!-- 회원가입 링크 -->
    <p class="text-center font-body-sm text-body-sm text-secondary">
      계정이 없으신가요?
      <a href="/register" class="text-primary font-bold hover:underline">회원가입</a>
    </p>
  </div>

  </main>

  <script>
fetch('../components/user-navbar.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('navbar-container').innerHTML = html;
  })
  .catch(() => {
    console.warn('user-navbar.html을 불러오지 못했습니다.');
  });
</script>
</body>
</html>
