<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{"primary-container":"#0070eb","primary":"#0058bc","outline-variant":"#c1c6d7","on-primary":"#ffffff","secondary":"#5e5e5e","on-surface":"#1c1b1b","surface":"#fcf9f8","outline":"#717786"},
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"sm":"8px","md":"16px","container-max":"1280px","lg":"24px","xl":"48px","gutter":"20px"},
    fontFamily:{"body-md":["Space Grotesk"],"display":["Space Grotesk"],"code-md":["JetBrains Mono"]},
    fontSize:{"body-md":["16px",{"lineHeight":"1.6"}],"h2":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"display":["48px",{"lineHeight":"1.1","fontWeight":"700"}]}
  }}
}
</script>
<style>
body{background-color:#fcf9f8;margin:0;padding:0;}
.spinner{width:100px;height:100px;border-radius:50%;border:4px solid #c1c6d7;border-top:4px solid #0058bc;animation:spin 1.2s linear infinite;margin:0 auto 2rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#0058bc;margin:0 3px;animation:bounce 1.2s infinite ease-in-out;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body class="bg-surface font-body-md text-on-surface">

<div id="navbar-container"></div>

<!-- 매칭 대기 -->
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);text-align:center;padding:2rem;">
  <div class="spinner"></div>
  <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;font-family:'Space Grotesk',sans-serif;">
    매칭 검색 중<span class="dots" style="margin-left:6px"><span></span><span></span><span></span></span>
  </h2>
  <p style="color:#717786;margin-bottom:2rem;">현재 접속 중인 사용자와 연결하고 있어요.</p>

  <div style="background:#fff;border:1px solid #c1c6d7;border-radius:8px;padding:1.5rem 3rem;margin-bottom:2rem;">
    <div style="font-size:0.75rem;color:#717786;font-family:'JetBrains Mono',monospace;margin-bottom:4px;">대기 시간</div>
    <div id="timer" style="font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:700;color:#0058bc;letter-spacing:0.05em;">00:00</div>
  </div>

  <button onclick="location.href='main.html'" class="px-md py-sm border border-outline-variant text-secondary rounded-lg font-body-md hover:text-red-500 hover:border-red-400 transition-all">
    매칭 취소
  </button>
</div>

<script>
let sec=0;
setInterval(()=>{
  sec++;
  const m=String(Math.floor(sec/60)).padStart(2,'0');
  const s=String(sec%60).padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s;
},1000);
</script>
<script>
fetch('../components/user-navbar.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('navbar-container').innerHTML = html;
  })
  .catch(() => {
    console.warn('user-navbar.html을 불러오지 못했습니다.');
  });
</script>
</body>
</html>
