<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{"primary-container":"#0070eb","primary":"#0058bc","outline-variant":"#c1c6d7","on-primary":"#ffffff","secondary":"#5e5e5e","on-surface":"#1c1b1b","surface":"#fcf9f8","outline":"#717786"},
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"sm":"8px","md":"16px","container-max":"1280px","lg":"24px","xl":"48px","gutter":"20px"},
    fontFamily:{"body-md":["Space Grotesk"],"display":["Space Grotesk"],"code-md":["JetBrains Mono"]},
    fontSize:{"body-md":["16px",{"lineHeight":"1.6"}],"h2":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"display":["48px",{"lineHeight":"1.1","fontWeight":"700"}]}
  }}
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background-color:#fcf9f8;font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.timer{font-family:'JetBrains Mono',monospace;font-size:1rem;color:#0058bc;font-weight:700;}
.main-area{position:relative;display:flex;flex:1;overflow:hidden;}
.drawer{position:absolute;left:0;top:0;bottom:0;width:340px;background:#fff;border-right:1px solid #c1c6d7;overflow:hidden;transform:translateX(-100%);transition:transform 0.3s ease;z-index:20;box-shadow:8px 0 24px rgba(28,27,27,0.12);}
.drawer.open{transform:translateX(0);}
.drawer-inner{width:340px;padding:1.2rem;height:100%;overflow-y:auto;}
.section-label{font-size:0.75rem;color:#717786;margin-top:1rem;margin-bottom:0.3rem;font-family:'JetBrains Mono',monospace;}
.section-body{font-size:0.85rem;line-height:1.6;color:#414755;background:#f6f3f2;border-radius:6px;padding:0.7rem;}
.code-example{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#0058bc;background:#f0f4ff;border-radius:6px;padding:0.7rem;}
.editors{display:grid;grid-template-columns:1fr 1fr;width:100%;flex:1;overflow:hidden;}
.editor-pane{display:flex;flex-direction:column;border-right:1px solid #c1c6d7;overflow:hidden;}
.editor-pane:last-child{border-right:none;}
.editor-header{background:#f6f3f2;border-bottom:1px solid #c1c6d7;padding:0.5rem 1rem;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;flex-shrink:0;}
.editor-body{flex:1;background:#fcf9f8;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:0.85rem;line-height:1.7;overflow-y:auto;}
textarea.editor-body{resize:none;border:none;outline:none;color:#1c1b1b;width:100%;}
.editor-footer{background:#f6f3f2;border-top:1px solid #c1c6d7;padding:0.5rem 1rem;display:grid;grid-template-columns:120px 1fr 96px;gap:1rem;align-items:center;min-height:52px;font-size:0.8rem;flex-shrink:0;}
.lang-select{background:#fff;border:1px solid #c1c6d7;color:#1c1b1b;padding:3px 10px;border-radius:4px;font-size:0.8rem;width:100%;height:32px;}
.footer-center{justify-self:center;text-align:center;min-width:0;}.footer-action{justify-self:end;width:96px;}.submit-button{width:96px;height:32px;display:inline-flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div id="navbar-container"></div>
<div class="main-area">
  <!-- SIDE DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-inner">
      <button onclick="toggleDrawer()" class="px-md py-sm border border-outline-variant text-secondary rounded-lg text-sm hover:text-red-500 transition-all" style="margin-bottom:1rem">문제 닫기</button>
      <div style="font-size:0.75rem;color:#717786;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.8rem">Side Drawer — 문제</div>
      <div style="font-size:1rem;font-weight:700;margin-bottom:1rem;">A+B</div>
      <div class="section-label">문제 설명</div>
      <div class="section-body">두 정수 A와 B를 입력받아 합을 출력하시오.</div>
      <div class="section-label">입력</div>
      <div class="section-body">첫째 줄에 A와 B가 주어진다.</div>
      <div class="section-label">출력</div>
      <div class="section-body">첫째 줄에 A+B를 출력한다.</div>
      <div class="section-label">예제 입력</div>
      <div class="code-example">1 2</div>
      <div class="section-label">예제 출력</div>
      <div class="code-example">3</div>
    </div>
  </div>

  <!-- EDITORS -->
  <div class="editors">
    <div class="editor-pane">
      <div class="editor-header">
        <span style="font-family:'JetBrains Mono',monospace;color:#717786;font-size:0.8rem">상대방 코드 — 읽기 전용</span>
        <span style="font-size:0.75rem;color:#717786">상대방 상태: <span style="color:#0058bc">작성 중</span></span>
      </div>
      <div class="editor-body" style="color:#414755">
        <span style="color:#717786"># 상대방이 작성 중입니다...</span><br/><br/>
        <span style="color:#dc2626">print</span>(<span style="color:#0058bc">"상대 코드"</span>)
      </div>
      <div class="editor-footer">
        <span style="color:#717786">Python</span>
        <span class="footer-center" style="color:#717786">읽기 전용</span>
        <span class="footer-action"></span>
      </div>
    </div>
    <div class="editor-pane">
      <div class="editor-header">
        <span style="font-family:'JetBrains Mono',monospace;color:#717786;font-size:0.8rem">내 코드</span>
      </div>
      <textarea class="editor-body" placeholder="여기에 코드를 작성하세요...">a, b = map(int, input().split())
print(a + b)</textarea>
      <div class="editor-footer">
        <select class="lang-select"><option>Python</option><option>Java</option><option>C++</option></select>
        <span id="judgeResult" class="footer-center" style="font-family:'JetBrains Mono',monospace;color:#717786;font-size:0.8rem">채점 결과: -</span>
        <button onclick="submitCode()" class="footer-action submit-button px-md py-sm bg-primary text-on-primary rounded-lg font-bold text-sm hover:bg-primary-container transition-all">제출</button>
      </div>
    </div>
  </div>
</div>

<script>
let sec=0;
setInterval(()=>{
  sec++;
  const m=String(Math.floor(sec/60)).padStart(2,'0');
  const s=String(sec%60).padStart(2,'0');
  const timerEl=document.getElementById('timer');
  if(timerEl) timerEl.textContent=m+':'+s;
},1000);
function toggleDrawer(){
  const d=document.getElementById('drawer');
  d.classList.toggle('open');
  document.getElementById('toggleDrawer').textContent=d.classList.contains('open')?'문제 닫기':'문제 보기';
}
function submitCode(){
  const el=document.getElementById('judgeResult');
  el.textContent='채점 중...';el.style.color='#0058bc';
  setTimeout(()=>{
    el.textContent='채점 결과: Accepted';el.style.color='#16a34a';
    setTimeout(()=>location.href='result.html',1000);
  },1500);
}
</script>
<script>
fetch('../components/battle-navbar.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('navbar-container').innerHTML = html;
  })
  .catch(() => {
    console.warn('battle-navbar.html을 불러오지 못했습니다.');
  });
</script>
</body>
</html>
