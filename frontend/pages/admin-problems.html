<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{extend:{
    colors:{"primary-container":"#0070eb","primary":"#0058bc","outline-variant":"#c1c6d7","on-primary":"#ffffff","secondary":"#5e5e5e","on-surface":"#1c1b1b","surface":"#fcf9f8","outline":"#717786"},
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"sm":"8px","md":"16px","container-max":"1280px","lg":"24px","xl":"48px","gutter":"20px"},
    fontFamily:{"body-md":["Space Grotesk"],"display":["Space Grotesk"],"code-md":["JetBrains Mono"]},
    fontSize:{"body-md":["16px",{"lineHeight":"1.6"}],"h2":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"display":["48px",{"lineHeight":"1.1","fontWeight":"700"}]}
  }}
}
</script>
<style>
body{background-color:#fcf9f8;margin:0;padding:0;}
.page-wrap{max-width:1280px;margin:2rem auto;padding:0 20px;display:grid;grid-template-columns:1fr 420px;gap:1.5rem;}
.card{background:#fff;border:1px solid #c1c6d7;border-radius:8px;padding:1.5rem;margin-bottom:1rem;}
.card-title{font-size:12px;color:#717786;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;font-size:0.85rem;}
th{color:#717786;font-size:0.75rem;text-transform:uppercase;padding:0.6rem 0.8rem;text-align:left;border-bottom:1px solid #c1c6d7;letter-spacing:0.05em;}
td{padding:0.75rem 0.8rem;border-bottom:1px solid #e5e2e1;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f6f3f2;}
.form-label{font-size:0.8rem;color:#717786;margin-bottom:0.3rem;display:block;font-weight:600;letter-spacing:0.03em;}
.form-input{background:#fcf9f8;border:1px solid #c1c6d7;color:#1c1b1b;padding:8px 12px;border-radius:8px;width:100%;font-size:0.85rem;margin-bottom:1rem;outline:none;font-family:'Space Grotesk',sans-serif;transition:border-color 0.2s;}
.form-input:focus{border-color:#0058bc;}
textarea.form-input{resize:vertical;min-height:70px;font-family:'JetBrains Mono',monospace;}
.select-input{background:#fcf9f8;border:1px solid #c1c6d7;color:#1c1b1b;padding:8px 12px;border-radius:8px;width:100%;font-size:0.85rem;margin-bottom:1rem;outline:none;}
.tc-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem;}
.admin-badge{font-size:0.65rem;background:#e3b341;color:#000;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body class="bg-surface font-body-md text-on-surface">

<!-- NAVBAR -->
<header class="bg-surface top-0 sticky z-50 border-b border-outline-variant">
<div class="flex justify-between items-center h-16 w-full max-w-container-max mx-auto px-gutter">
  <div class="flex items-center gap-xl">
    <a class="font-display text-h2 font-bold text-primary tracking-tight" href="#">
      CodeBattles <span class="admin-badge">ADMIN</span>
    </a>
    <nav class="hidden md:flex items-center gap-lg h-full">
      <a class="font-body-md text-body-md text-secondary font-medium hover:text-primary transition-colors" href="main.html">배틀하기</a>
      <a class="font-body-md text-body-md text-primary font-bold border-b-2 border-primary pb-1" href="admin-problems.html">문제 설정</a>
      <a class="font-body-md text-body-md text-secondary font-medium hover:text-primary transition-colors" href="#">랭킹</a>
      <a class="font-body-md text-body-md text-secondary font-medium hover:text-primary transition-colors" href="#">기록</a>
    </nav>
  </div>
  <div class="flex items-center gap-md">
    <span class="font-body-md text-body-md text-secondary font-medium">관리자</span>
    <button onclick="location.href='index.html'" class="font-body-md text-body-md px-md py-sm bg-primary text-on-primary rounded-lg font-bold hover:bg-primary-container active:scale-95 transition-all">로그아웃</button>
  </div>
</div>
</header>

<div class="page-wrap">

  <!-- LEFT: 문제 목록 -->
  <div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:1.2rem;font-family:'Space Grotesk',sans-serif;">관리자 문제 설정</div>
    <div class="card">
      <div class="card-title">문제 목록</div>
      <table>
        <thead>
          <tr><th>ID</th><th>문제 제목</th><th>난이도</th><th>테스트케이스</th><th>관리</th></tr>
        </thead>
        <tbody>
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;color:#0058bc">1</td>
            <td>A+B</td>
            <td><span style="color:#16a34a;font-size:0.8rem">쉬움</span></td>
            <td><span style="font-family:'JetBrains Mono',monospace;color:#0058bc">5개</span></td>
            <td style="display:flex;gap:6px">
              <button onclick="loadProblem(1)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-yellow-400 hover:text-yellow-600 transition-all">수정</button>
              <button onclick="deleteProblem(1)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-red-400 hover:text-red-500 transition-all">삭제</button>
            </td>
          </tr>
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;color:#0058bc">2</td>
            <td>배열 합</td>
            <td><span style="color:#16a34a;font-size:0.8rem">쉬움</span></td>
            <td><span style="font-family:'JetBrains Mono',monospace;color:#0058bc">8개</span></td>
            <td style="display:flex;gap:6px">
              <button onclick="loadProblem(2)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-yellow-400 hover:text-yellow-600 transition-all">수정</button>
              <button onclick="deleteProblem(2)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-red-400 hover:text-red-500 transition-all">삭제</button>
            </td>
          </tr>
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;color:#0058bc">3</td>
            <td>괄호 검사</td>
            <td><span style="color:#e3b341;font-size:0.8rem">보통</span></td>
            <td><span style="font-family:'JetBrains Mono',monospace;color:#0058bc">10개</span></td>
            <td style="display:flex;gap:6px">
              <button onclick="loadProblem(3)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-yellow-400 hover:text-yellow-600 transition-all">수정</button>
              <button onclick="deleteProblem(3)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-red-400 hover:text-red-500 transition-all">삭제</button>
            </td>
          </tr>
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;color:#0058bc">4</td>
            <td>최단 경로</td>
            <td><span style="color:#dc2626;font-size:0.8rem">어려움</span></td>
            <td><span style="font-family:'JetBrains Mono',monospace;color:#0058bc">12개</span></td>
            <td style="display:flex;gap:6px">
              <button onclick="loadProblem(4)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-yellow-400 hover:text-yellow-600 transition-all">수정</button>
              <button onclick="deleteProblem(4)" class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-red-400 hover:text-red-500 transition-all">삭제</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: 등록/수정 폼 -->
  <div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:1.2rem;font-family:'Space Grotesk',sans-serif;" id="formTitle">새 문제 등록</div>
    <div class="card">
      <div class="card-title">문제 등록 / 수정 폼</div>

      <label class="form-label">제목</label>
      <input class="form-input" type="text" id="fTitle" placeholder="문제 제목 입력"/>

      <label class="form-label">설명</label>
      <textarea class="form-input" id="fDesc" placeholder="문제 설명을 입력하세요"></textarea>

      <label class="form-label">난이도</label>
      <select class="select-input" id="fDiff">
        <option>쉬움</option><option>보통</option><option>어려움</option>
      </select>

      <label class="form-label">입력 설명</label>
      <textarea class="form-input" id="fInput" placeholder="입력 형식 설명"></textarea>

      <label class="form-label">출력 설명</label>
      <textarea class="form-input" id="fOutput" placeholder="출력 형식 설명"></textarea>

      <label class="form-label">테스트케이스</label>
      <div id="tcContainer">
        <div class="tc-row">
          <input class="form-input" type="text" placeholder="입력 예시" style="margin-bottom:0"/>
          <input class="form-input" type="text" placeholder="출력 예시" style="margin-bottom:0"/>
        </div>
      </div>
      <button onclick="addTC()" class="w-full px-md py-sm border border-dashed border-outline-variant text-secondary rounded-lg text-sm hover:border-primary hover:text-primary transition-all" style="margin-bottom:1rem">+ 테스트케이스 추가</button>

      <button onclick="submitForm()" class="w-full px-md py-sm bg-primary text-on-primary rounded-lg font-bold hover:bg-primary-container active:scale-95 transition-all">등록 / 저장</button>
    </div>
  </div>

</div>

<script>
function addTC(){
  const row=document.createElement('div');
  row.className='tc-row';
  row.innerHTML=`
    <input class="form-input" type="text" placeholder="입력 예시" style="margin-bottom:0"/>
    <input class="form-input" type="text" placeholder="출력 예시" style="margin-bottom:0"/>
  `;
  document.getElementById('tcContainer').appendChild(row);
}
function loadProblem(id){
  const titles=['','A+B','배열 합','괄호 검사','최단 경로'];
  document.getElementById('formTitle').textContent='문제 수정 (ID: '+id+')';
  document.getElementById('fTitle').value=titles[id];
}
function deleteProblem(id){
  if(confirm('문제 ID '+id+'를 삭제하시겠습니까?'))alert('삭제되었습니다. (백엔드 API 연동 필요)');
}
function submitForm(){
  alert('저장되었습니다. (백엔드 API 연동 필요)');
}
</script>
</body>
</html>
