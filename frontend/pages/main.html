<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary-container":"#0070eb","primary":"#0058bc","outline-variant":"#c1c6d7",
        "on-primary":"#ffffff","secondary":"#5e5e5e","on-surface":"#1c1b1b",
        "surface":"#fcf9f8","secondary-fixed-dim":"#c6c6c6","inverse-primary":"#adc6ff","outline":"#717786"
      },
      borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
      spacing:{"base":"4px","sm":"8px","md":"16px","container-max":"1280px","lg":"24px","xl":"48px","xs":"4px","gutter":"20px"},
      fontFamily:{"code-md":["JetBrains Mono"],"body-md":["Space Grotesk"],"display":["Space Grotesk"]},
      fontSize:{
        "body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}],
        "h2":["24px",{"lineHeight":"1.3","fontWeight":"600"}],
        "display":["48px",{"lineHeight":"1.1","letterSpacing":"-0.02em","fontWeight":"700"}]
      }
    }
  }
}
</script>
<style>
body{background-color:#fcf9f8;margin:0;padding:0;}
.card{background:#fff;border:1px solid #c1c6d7;border-radius:8px;padding:1.5rem;margin-bottom:1rem;}
.card-title{font-size:12px;color:#717786;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:1rem;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid #e5e2e1;font-size:0.9rem;}
.info-row:last-child{border-bottom:none;}
.info-label{color:#5e5e5e;}
.info-value{font-family:'JetBrains Mono',monospace;font-weight:700;}
.request-box{background:#f0f4ff;border:1px solid #0058bc;border-radius:8px;padding:1rem;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center;font-size:0.9rem;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.match-box{background:#f6f3f2;border:1px solid #c1c6d7;border-radius:8px;padding:1.2rem;}
.match-box h6{font-size:0.8rem;color:#5e5e5e;margin-bottom:0.8rem;font-weight:600;}
.match-box p{font-size:0.85rem;color:#717786;margin-bottom:1rem;}
.input-nick{background:#fff;border:1px solid #c1c6d7;color:#1c1b1b;padding:8px 12px;border-radius:8px;width:100%;font-size:0.85rem;margin-bottom:0.5rem;outline:none;}
.input-nick:focus{border-color:#0058bc;}
table{width:100%;border-collapse:collapse;font-size:0.85rem;}
th{color:#717786;font-size:0.75rem;text-transform:uppercase;padding:0.6rem 0.8rem;text-align:left;border-bottom:1px solid #c1c6d7;letter-spacing:0.05em;}
td{padding:0.7rem 0.8rem;border-bottom:1px solid #e5e2e1;}
tr:last-child td{border-bottom:none;}
.page-grid{max-width:1280px;margin:2rem auto;padding:0 20px;display:grid;grid-template-columns:300px 1fr;gap:1.5rem;}
</style>
</head>
<body class="bg-surface font-body-md text-on-surface">

<div id="navbar-container"></div>

<div class="page-grid">
  <!-- LEFT: 내 정보 -->
  <div>
    <div class="card">
      <div class="card-title">내 정보</div>
      <div class="info-row"><span class="info-label">닉네임</span><span class="info-value">철몽</span></div>
      <div class="info-row"><span class="info-label">ID</span><span class="info-value" style="color:#717786">user01</span></div>
      <div class="info-row"><span class="info-label">전적</span><span class="info-value"><span style="color:#16a34a">3승</span> <span style="color:#dc2626">2패</span></span></div>
      <div class="info-row"><span class="info-label">상태</span><span style="color:#16a34a;font-size:0.85rem">● 대기 중</span></div>
      <div class="info-row"><span class="info-label">랭킹</span><span class="info-value" style="color:#0058bc">#42</span></div>
    </div>
    <div class="card">
      <div class="card-title">최근 배틀 요청</div>
      <div class="request-box">
        <span><strong style="color:#0058bc">김건한</strong>님이 배틀을 신청했습니다.</span>
        <div style="display:flex;gap:6px">
          <button class="px-md py-sm bg-primary text-on-primary rounded-lg font-bold text-sm hover:bg-primary-container transition-all">수락</button>
          <button class="px-md py-sm border border-outline-variant text-secondary rounded-lg text-sm hover:text-red-500 transition-all">거절</button>
        </div>
      </div>
      <p style="color:#717786;font-size:0.8rem;text-align:center">새로운 요청이 없습니다.</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div>
    <div class="card">
      <div class="card-title">배틀 시작</div>
      <div class="match-grid">
        <div class="match-box">
          <h6>자동 매칭</h6>
          <p>현재 접속 중인 사용자와 자동으로 매칭됩니다.</p>
          <button onclick="location.href='matching.html'" class="w-full px-md py-sm bg-primary text-on-primary rounded-lg font-bold text-sm hover:bg-primary-container transition-all" style="margin-bottom:8px">자동 매칭 시작</button>
          <button class="w-full px-md py-sm border border-outline-variant text-secondary rounded-lg text-sm hover:border-primary hover:text-primary transition-all">매칭 취소</button>
        </div>
        <div class="match-box">
          <h6>특정 사용자와 배틀</h6>
          <p>상대방 닉네임을 입력하고 배틀을 신청하세요.</p>
          <input class="input-nick" type="text" placeholder="상대 닉네임 입력"/>
          <button class="w-full px-md py-sm bg-primary text-on-primary rounded-lg font-bold text-sm hover:bg-primary-container transition-all">배틀 신청</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">온라인 사용자 목록</div>
      <table>
        <thead><tr><th>닉네임</th><th>ID</th><th>상태</th><th>관리</th></tr></thead>
        <tbody>
          <tr>
            <td>김건한</td><td style="font-family:monospace;color:#717786">user02</td>
            <td><span style="color:#16a34a;font-size:0.85rem">● 대기 중</span></td>
            <td><button class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs hover:border-primary hover:text-primary transition-all">배틀 신청</button></td>
          </tr>
          <tr>
            <td>조하은</td><td style="font-family:monospace;color:#717786">user03</td>
            <td><span style="color:#dc2626;font-size:0.85rem">● 배틀 중</span></td>
            <td><button class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs opacity-40" disabled>신청 불가</button></td>
          </tr>
          <tr>
            <td>유지민</td><td style="font-family:monospace;color:#717786">user04</td>
            <td><span style="color:#717786;font-size:0.85rem">● 매칭 중</span></td>
            <td><button class="px-sm py-1 border border-outline-variant text-secondary rounded text-xs opacity-40" disabled>신청 불가</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
fetch('../components/user-navbar.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('navbar-container').innerHTML = html;
  })
  .catch(() => {
    console.warn('user-navbar.html을 불러오지 못했습니다.');
  });
</script>
</body>
</html>
